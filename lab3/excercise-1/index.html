<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Catalog</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="header">
        <h1>University Course Catalog</h1>
    </header>
    
    <main class="main">
        <div class="container">
            <!-- Search and filters section -->
            <div class="controls">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search courses..."
                    class="search-input"
                >
                
                <div class="filters">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="web">Web</button>
                    <button class="filter-btn" data-category="database">Database</button>
                    <button class="filter-btn" data-category="systems">Systems</button>
                </div>
            </div>
            
            <!-- Results count -->
            <div id="results-info" class="results-info"></div>
            
            <!-- Course list (populated by JavaScript) -->
            <div id="course-list" class="course-grid">
                <!-- Courses will be inserted here -->
            </div>
        </div>
    </main>
    
    <script src="./js/app.js"></script>
</body>
</html>
